<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPC Portrait Harness - Underdark Fishing</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .control-bar {
            background: var(--panel); border: 1px solid var(--border);
            padding: 1rem; border-radius: 0.5rem; display: flex; gap: 1.5rem;
            align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem;
        }
        .control-bar label { font-size: 0.9rem; color: var(--accent-2); display: flex; flex-direction: column; gap: 0.4rem;}
        .control-bar select, .control-bar input {
            background: var(--bg-2); border: 1px solid var(--border); color: var(--ink);
            padding: 0.5rem; border-radius: 0.25rem; font-family: inherit; font-size: 0.9rem;
        }
        .btn {
            background: linear-gradient(180deg, #22D3EE, #0E7490); color: #020617; font-weight: bold; border: 1px solid var(--accent);
            padding: 0.6rem 1.2rem; border-radius: 0.25rem; cursor: pointer; font-family: inherit; text-decoration: none;
        }
        .btn:hover { filter: brightness(1.1); }
        
        .portraits { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
        .portrait-card { background: var(--panel-2); border: 1px solid var(--border); padding: 0.75rem; border-radius: 0.375rem; }
        .portrait-card img { width: 100%; image-rendering: pixelated; background: #0b1226; border-radius: 0.25rem; border: 1px solid #1E293B; }
        
        .npc-info { margin-top: 0.5rem; text-align: center; }
        .npc-name { display: block; font-size: 1.05rem; color: var(--accent); font-weight: bold; font-family: 'Cinzel', serif; }
        .npc-lore { color: var(--ink); font-size: 0.85rem; margin-top: 0.2rem; }
        .npc-profession { color: #FBBF24; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        
        .meta { color: var(--muted); font-size: 0.75rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.2rem; margin-top: 0.5rem; }
        .tag { display: inline-block; padding: 0.1rem 0.3rem; border-radius: 0.2rem; background: var(--bg); border: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1400px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>👤 NPC Portrait & Data Harness</h1>
            <a href="index.html" style="background: var(--panel-2); color: var(--ink); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 0.25rem; text-decoration: none;">← Back to Hub</a>
        </div>
        
        <div class="control-bar">
            <label>Race
                <select id="race">
                    <option value="Any">Random (Any)</option>
                    <option value="Human">Human</option>
                    <option value="Dwarf">Dwarf</option>
                    <option value="Elf">Elf</option>
                    <option value="Orc">Orc</option>
                    <option value="Tiefling">Tiefling</option> <!-- NEW -->
                    <option value="Myconid">Myconid</option>   <!-- NEW -->
                </select>
            </label>
            <label>Gender
                <select id="gender">
                    <option value="Any">Random (Any)</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </label>
            <label>Seed <input id="seed" type="number" value="" placeholder="Random"/></label>
            <label>Count <input id="count" type="number" value="12" min="1" max="96" style="width:5rem"/></label>
            <button class="btn" id="gen-btn" style="margin-top: 1.3rem;">Generate NPCs</button>
        </div>

        <div id="portraits" class="portraits"></div>
    </div>

    <!-- Script uses our new Data Generator Wrapper -->
    <script type="module">
        import { generateNPCData } from './js/data/npc_data_generator.js';

        document.getElementById('gen-btn').addEventListener('click', () => {
            const requestedRace = document.getElementById('race').value;
            const requestedGender = document.getElementById('gender').value;
            
            const baseSeedInput = document.getElementById('seed').value;
            const baseSeed = baseSeedInput ? parseInt(baseSeedInput) : Date.now();
            const count = Math.min(96, parseInt(document.getElementById('count').value) || 12);
            
            const container = document.getElementById('portraits');
            container.innerHTML = ''; 

            for (let i = 0; i < count; i++) {
                const seed = (baseSeed + i * 202) >>> 0;
                
                // Call the Master Data Generator
                const npc = generateNPCData({ 
                    seed: seed, 
                    race: requestedRace, 
                    gender: requestedGender 
                });
                
                const card = document.createElement('div');
                card.className = 'portrait-card';
                
                if (npc.imageDataUrl) {
                    card.innerHTML = `
                        <img src="${npc.imageDataUrl}" alt="${npc.name}" />
                        <div class="npc-info">
                            <span class="npc-name">${npc.name}</span>
                            <div class="npc-profession">${npc.archetype}</div>
                            <div class="npc-lore">${npc.race} ${npc.gender}, Age ${npc.age}</div>
                        </div>
                        <div class="meta">
                            <span class="tag">Hair: ${npc.artData.hairStyle || 'N/A'}</span>
                            ${npc.artData.beardStyle !== 'none' && npc.artData.beardStyle ? `<span class="tag">Beard: ${npc.artData.beardStyle}</span>` : ''}
                            <span class="tag">Skin: ${npc.palettes.skin}</span>
                            <span class="tag">Feature: ${npc.artData.feature}</span>
                        </div>
                    `;
                } else {
                    card.innerHTML = `<p style="color:var(--warn)">Generator Missing for ${npc.race} ${npc.gender}</p>`;
                }
                
                container.appendChild(card);
            }
        });

        // Trigger on load
        document.getElementById('gen-btn').click();
    </script>
</body>
</html>
