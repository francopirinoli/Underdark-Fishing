<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment & Alchemy Harness - Underdark Fishing</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .control-bar { background: var(--panel); border: 1px solid var(--border); padding: 1rem; border-radius: 0.5rem; display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .control-bar label { font-size: 0.9rem; color: var(--accent-2); display: flex; flex-direction: column; gap: 0.4rem;}
        .control-bar select, .control-bar input { background: var(--bg-2); border: 1px solid var(--border); color: var(--ink); padding: 0.5rem; border-radius: 0.25rem; font-family: inherit; font-size: 0.9rem; }
        .btn { background: linear-gradient(180deg, #22D3EE, #0E7490); color: #020617; font-weight: bold; border: 1px solid var(--accent); padding: 0.6rem 1.2rem; border-radius: 0.25rem; cursor: pointer; font-family: inherit; text-decoration: none;}
        .btn:hover { filter: brightness(1.1); }
        
        .grid-output { display: grid; gap: 1rem; }
        .item-card { background: var(--panel-2); border: 1px solid var(--border); padding: 0.75rem; border-radius: 0.375rem; text-align: center; }
        .item-card img { width: 100%; image-rendering: pixelated; background: #0b1226; border-radius: 0.25rem; border: 1px solid #1E293B; }
        
        .comparison-card { display: flex; flex-direction: column; gap: 0.5rem; background: var(--panel); border: 1px solid var(--border); padding: 1rem; border-radius: 0.5rem;}
        .comparison-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        
        .tag { display: inline-block; padding: 0.1rem 0.3rem; border-radius: 0.2rem; background: var(--bg); border: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); margin-top: 0.5rem; margin-right: 0.25rem;}
        
        /* Stat formatting */
        .stat-line { font-size: 0.85rem; margin-bottom: 0.3rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--border); padding-bottom: 0.2rem; }
        .stat-line span.label { color: var(--muted); }
        .stat-line span.val { font-weight: bold; color: var(--ink); }
        .stat-line span.val.pos { color: var(--glow); }
        .stat-line span.val.magic { color: #A855F7; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1400px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>🧪 Equipment & Alchemy Harness</h1>
            <a href="index.html" style="background: var(--panel-2); color: var(--ink); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 0.25rem; text-decoration: none;">← Back to Hub</a>
        </div>
        
        <div class="control-bar">
            <label>Item Type
                <select id="item-type">
                    <option value="potion">Alchemy: Potion</option>
                    <option value="bait">Alchemy: Target Bait</option>
                    <option value="lure">Alchemy: Lure</option>
                    <option value="chest">Treasure Chest / Mimic</option>
                    <option value="boat">Boat / Hull</option>
                    <option value="rod">Fishing Rod</option>
                </select>
            </label>
            <label id="chest-state-label" style="display: none;">State Variations
                <select id="chest-state">
                    <option value="side_by_side">Side-by-Side (Normal vs Mimic)</option>
                    <option value="random">Random (Chance of Mimic)</option>
                </select>
            </label>
            <!-- NEW: Crafting Level Control for Alchemy -->
            <label id="craft-level-label">Player Crafting Stat
                <select id="craft-level">
                    <option value="1">Level 1 (Base)</option>
                    <option value="3">Level 3 (Skilled)</option>
                    <option value="5">Level 5 (Master)</option>
                </select>
            </label>
            <label>Seed <input id="seed" type="number" value="" placeholder="Random"/></label>
            <label>Count <input id="count" type="number" value="8" min="1" max="96" style="width:5rem"/></label>
            <button class="btn" id="gen-btn" style="margin-top: 1.3rem;">Generate</button>
        </div>

        <div id="output" class="grid-output"></div>
    </div>

    <script type="module">
        import { createRng } from './js/util/rng.js';
        import { generateChest } from './js/art/chest_generator.js';
        import { generateBoatData } from './js/data/boat_data_generator.js'; 
        import { generateRodData } from './js/data/rod_data_generator.js'; 
        import { LureCrafter } from './js/fishing/lure_crafter.js';
        import { AlchemyCrafter } from './js/fishing/alchemy_crafter.js';

        // Helper mock pool of parts with rarities
        const MOCK_PARTS = [
            { visualId: 'fish_gut', rarity: 'Common', stats: {color:10, sound:0, light:0, weight:0} },
            { visualId: 'bone_dust', rarity: 'Common', stats: {color:0, sound:10, light:0, weight:10} },
            { visualId: 'iron_sinker', rarity: 'Common', stats: {color:0, sound:0, light:0, weight:20} },
            { visualId: 'cave_crawler_leg', rarity: 'Uncommon', stats: {color:0, sound:20, light:0, weight:0} },
            { visualId: 'lead_sinker', rarity: 'Uncommon', stats: {color:0, sound:0, light:0, weight:30} },
            { visualId: 'spinner', rarity: 'Uncommon', stats: {color:0, sound:30, light:20, weight:0} },
            { visualId: 'phosphor_cap', rarity: 'Rare', stats: {color:0, sound:0, light:40, weight:0} },
            { visualId: 'wraith_silk', rarity: 'Rare', stats: {color:0, sound:0, light:10, weight:-30} },
            { visualId: 'myconid_spore', rarity: 'Rare', stats: {color:30, sound:0, light:10, weight:0} },
            { visualId: 'jelly_bell', rarity: 'Rare', stats: {color:20, sound:0, light:20, weight:-20} },
            { visualId: 'rat_tail', rarity: 'Common', stats: {color:0, sound:10, light:0, weight:0} },
            { visualId: 'glow_bulb', rarity: 'Uncommon', stats: {color:0, sound:0, light:30, weight:0} },
            { visualId: 'rattler_bells', rarity: 'Uncommon', stats: {color:0, sound:40, light:0, weight:0} }
        ];

        document.getElementById('item-type').addEventListener('change', (e) => {
            const val = e.target.value;
            document.getElementById('chest-state-label').style.display = val === 'chest' ? 'flex' : 'none';
            document.getElementById('craft-level-label').style.display = ['potion', 'bait', 'lure'].includes(val) ? 'flex' : 'none';
        });

        document.getElementById('gen-btn').addEventListener('click', () => {
            const type = document.getElementById('item-type').value;
            const state = document.getElementById('chest-state').value;
            const craftLevel = parseInt(document.getElementById('craft-level').value);
            
            const baseSeedInput = document.getElementById('seed').value;
            const baseSeed = baseSeedInput ? parseInt(baseSeedInput) : Date.now();
            const count = Math.min(96, parseInt(document.getElementById('count').value) || 8);
            
            const container = document.getElementById('output');
            container.innerHTML = ''; 

            if (type === 'boat') container.style.gridTemplateColumns = 'repeat(auto-fill, minmax(400px, 1fr))';
            else if (type === 'chest' && state === 'side_by_side') container.style.gridTemplateColumns = 'repeat(auto-fill, minmax(320px, 1fr))';
            else container.style.gridTemplateColumns = 'repeat(auto-fill, minmax(260px, 1fr))';

            for (let i = 0; i < count; i++) {
                const seed = (baseSeed + i * 111) >>> 0;
                const rng = createRng(seed);
                
                // Helper to get 3 to 5 random parts
                const getMockParts = () => {
                    const numParts = rng.int(3, 5);
                    const parts = [];
                    for(let p = 0; p < numParts; p++) parts.push(rng.pick(MOCK_PARTS));
                    return parts;
                };

                // === 1. POTION LOGIC ===
                if (type === 'potion') {
                    const parts = getMockParts();
                    const result = AlchemyCrafter.craftPotion(parts, craftLevel, seed);
                    
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.style.textAlign = 'left';
                    card.innerHTML = `
                        <div style="text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.5rem;">
                            <img src="${result.imageDataUrl}" style="width: 120px; border: none; background: transparent;" />
                            <b style="color: var(--glow); display: block; font-family: 'Cinzel', serif; font-size: 1.1rem;">${result.name}</b>
                            <div class="muted small">${parts.length} Ingredients</div>
                        </div>
                        <div class="stat-line"><span class="label">Buff Target</span> <span class="val magic">+${result.buff.amount} ${result.buff.statName}</span></div>
                        <div class="stat-line"><span class="label">Duration</span> <span class="val">${Math.floor(result.buff.durationMins / 60)}h ${result.buff.durationMins % 60}m</span></div>
                        <div style="margin-top: 0.5rem; color: #FBBF24; text-align: center; font-weight: bold;">💰 ${result.basePrice}g</div>
                        <div style="margin-top: 0.5rem;">${parts.map(p => `<span class="tag">${p.visualId.replace(/_/g, ' ')}</span>`).join('')}</div>
                    `;
                    container.appendChild(card);
                }
                
                // === 2. BAIT LOGIC ===
                else if (type === 'bait') {
                    const parts = getMockParts();
                    const result = AlchemyCrafter.craftBait(parts, craftLevel, seed);
                    
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.style.textAlign = 'left';
                    card.innerHTML = `
                        <div style="text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.5rem;">
                            <img src="${result.imageDataUrl}" style="width: 120px; border: none; background: transparent;" />
                            <b style="color: var(--warn); display: block; font-family: 'Cinzel', serif; font-size: 1.1rem;">${result.name}</b>
                            <div class="muted small">${parts.length} Ingredients</div>
                        </div>
                        <div class="stat-line"><span class="label">Attracts</span> <span class="val">${result.targetFamily}</span></div>
                        <div class="stat-line"><span class="label">Casts Remaining</span> <span class="val">${result.charges}</span></div>
                        <div class="stat-line"><span class="label">Rarity Boost</span> <span class="val pos">+${result.rarityBoostPct}%</span></div>
                        <div style="margin-top: 0.5rem; color: #FBBF24; text-align: center; font-weight: bold;">💰 ${result.basePrice}g</div>
                        <div style="margin-top: 0.5rem;">${parts.map(p => `<span class="tag">${p.visualId.replace(/_/g, ' ')}</span>`).join('')}</div>
                    `;
                    container.appendChild(card);
                }

                // === 3. LURE LOGIC ===
                else if (type === 'lure') {
                    const parts = getMockParts();
                    const result = LureCrafter.craft(parts, craftLevel, seed);
                    
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.style.textAlign = 'left';
                    card.innerHTML = `
                        <div style="text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.5rem;">
                            <img src="${result.imageDataUrl}" style="width: 120px; border: none; background: transparent;" />
                            <b style="color: var(--accent); display: block; font-family: 'Cinzel', serif; font-size: 1.1rem;">${result.name}</b>
                            <div class="muted small">${parts.length} Ingredients</div>
                        </div>
                        <div class="stat-line"><span class="label">Durability</span> <span class="val">${result.durability} Casts</span></div>
                        <div class="stat-line"><span class="label">Color</span> <span class="val">${result.stats.color}</span></div>
                        <div class="stat-line"><span class="label">Sound</span> <span class="val">${result.stats.sound}</span></div>
                        <div class="stat-line"><span class="label">Light</span> <span class="val">${result.stats.light}</span></div>
                        <div class="stat-line"><span class="label">Weight</span> <span class="val">${result.stats.weight}</span></div>
                        <div style="margin-top: 0.5rem; color: #FBBF24; text-align: center; font-weight: bold;">💰 ${result.basePrice}g</div>
                    `;
                    container.appendChild(card);
                }

                // === OLD GENERATORS (CHEST, BOAT, ROD) Remain the same ... ===
                // (Omitted here for brevity, they match your existing harness logic)
                else if (type === 'rod') {
                    const result = generateRodData({ rng });
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.style.textAlign = 'left';
                    card.innerHTML = `
                        <div style="text-align: center;">
                            <img src="${result.art.imageDataUrl}" style="width: 120px; border: none; background: transparent;" />
                            <b style="color: var(--ink); display: block;">${result.identity.name}</b>
                        </div>
                    `;
                    container.appendChild(card);
                }
            }
        });

        // Trigger on load
        document.getElementById('gen-btn').click();
    </script>
</body>
</html>
